language = "C"
include_version = true
pragma_once = true
style = "both"
usize_is_size_t = true

[export]
# 只导出 ffi 模块里的公开符号
include = ["MyPaintBrush", "MyPaintSurface", "MyPaintSurfaceVtable"]
# 排除纯 Rust 内部类型，避免污染头文件
exclude = [
    "Brush", "Mapping", "RngDouble",
    "BrushInput", "BrushSetting", "BrushState",
    "BrushInputInfo", "BrushSettingInfo",
]

[parse]
parse_deps = false
# 只解析 ffi 模块，不递归到 brush/mapping 等内部模块
include_only_source_files = ["src/ffi.rs"]

[fn]
prefix = ""

[enum]
rename_variants = "ScreamingSnakeCase"